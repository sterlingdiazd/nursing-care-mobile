name: Mobile CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  security_scans:
    name: Security Scans (Gitleaks + Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy Vulnerability Scan (FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  typecheck_and_test:
    runs-on: ubuntu-latest
    needs: security_scans

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Validate design system (tokens, a11y, no off-scale styles)
        run: npm run validate-design

      - name: Run tests
        run: npm test
